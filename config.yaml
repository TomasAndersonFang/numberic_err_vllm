model:
  name_or_path: "Qwen/Qwen2.5-Coder-7B-Instruct"
  tensor_parallel_size: 1
  dtype: "bfloat16"
  gpu_memory_utilization: 0.4
  enforce_eager: true
  max_model_len: 4096
  # 新增：E_vllm_default 模式下使用，默认 256 是 vLLM 的内置默认
  max_num_seqs: 256

generation:
  temperature: 0.0
  max_new_tokens: 1024
  num_samples: 1
  transformers_batch_size: 8
  # 新增：固定随机种子，贪心解码理论上不需要，但 vLLM 调度可能用到
  seed: 42

eval:
  dataset: "mbpp"
  subset: "plus"

output:
  dir: "./Qwen/Qwen2.5-Coder-7B-Instruct-mbpp-plus"