model:
  name_or_path: "Qwen/Qwen2.5-Coder-1.5B-Instruct"
  tensor_parallel_size: 1
  dtype: "bfloat16"
  gpu_memory_utilization: 0.35
  enforce_eager: true
  max_model_len: 4096

generation:
  temperature: 0.0
  max_new_tokens: 512
  num_samples: 1
  transformers_batch_size: 8

eval:
  dataset: "mbpp"
  subset: "plus"

output:
  dir: "./outputs"
